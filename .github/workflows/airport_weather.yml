name: Build Airport Weather Cache

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo structure (DEBUG)
        run: |
          echo "=== REPO STRUCTURE ==="
          ls -R

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run weather builder
        run: |
          echo "=== RUNNING PYTHON ==="
          python build_weather.py
          echo "=== PYTHON DONE ==="

      - name: Verify file output (DEBUG)
        run: |
          echo "=== CHECKING OUTPUT FILE ==="
          ls -lah
          cat airport_weather.json || echo "FILE NOT FOUND"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add airport_weather.json

          echo "=== GIT STATUS ==="
          git status

          git commit -m "update weather cache" || echo "NO CHANGES TO COMMIT"
          git push || echo "NO PUSH NEEDED"
