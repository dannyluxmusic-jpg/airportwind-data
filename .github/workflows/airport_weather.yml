name: Build Airport Weather Cache

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run weather builder V2
        run: python build_weather_v2.py

      # 🔥 FULL DEBUG BLOCK (THIS IS WHAT WE NEEDED)
      - name: Debug output (FULL TRACE)
        run: |
          echo "========================"
          echo "WORKING DIRECTORY"
          pwd
          echo "========================"
          echo "FULL FILE TREE"
          ls -R
          echo "========================"
          echo "JSON CONTENT (if exists)"
          cat airport_weather.json || echo "NO FILE FOUND"
          echo "========================"
          echo "FILE LOCATION CHECK"
          find . -name "airport_weather.json"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add airport_weather.json

          echo "GIT STATUS:"
          git status

          git commit -m "update weather cache v2" || echo "NO CHANGES"
          git push || echo "NO PUSH"
