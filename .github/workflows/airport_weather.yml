name: Build Airport Weather Cache

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show full repo structure (DEBUG)
        run: find .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Try running script (debug all paths)
        run: |
          echo "LOOKING FOR FILE..."
          ls -R
          python build_weather.py || true
          python .github/workflows/build_weather.py || true

      - name: Stop here for diagnosis
        run: echo "DONE DEBUG RUN"
