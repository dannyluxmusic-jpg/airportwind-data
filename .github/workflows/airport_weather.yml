name: Build Airport Weather Cache

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run weather builder
        run: python .github/workflows/build_weather.py

      - name: Debug output
        run: |
          echo "=== FILE CHECK ==="
          ls -R
          echo "=== JSON CONTENT ==="
          cat airport_weather.json || echo "NO FILE"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add airport_weather.json

          git status

          git commit -m "update weather cache" || echo "NO CHANGES"

          git push || echo "NO PUSH"
