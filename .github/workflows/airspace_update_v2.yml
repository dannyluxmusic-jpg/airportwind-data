name: Airspace Update V2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy existing airspace (stable)
        run: |
          mkdir -p airspace
          cp usa_airspace.geojson airspace/ || echo "No file found"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace
          git commit -m "Use existing airspace data" || echo "No changes"
          git push
