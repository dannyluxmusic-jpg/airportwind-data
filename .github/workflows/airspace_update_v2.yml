name: Airspace Update V2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin unzip curl grep
          pip install geopandas shapely fiona pyproj

      - name: Download FAA NASR (FINAL FIX)
        run: |
          curl -L "https://www.faa.gov/air_traffic/flight_info/aeronav/aero_data/NASR_Subscription/" -o index.html

          ZIP_URL=$(grep -o 'https://[^"]*NASR[^"]*\.zip' index.html | head -n 1)

          echo "Found ZIP: $ZIP_URL"

          curl -L -A "Mozilla/5.0" -o nasr.zip "$ZIP_URL"

          file nasr.zip
          ls -lh nasr.zip

      - name: Unzip NASR
        run: |
          unzip nasr.zip -d nasr

      - name: Build airspace
        run: python build_airspace.py

      - name: Save output
        run: |
          mkdir -p airspace
          mv airspace_final.geojson airspace/

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace
          git commit -m "Airspace update v2 (real vertical data)" || echo "No changes"
          git push
