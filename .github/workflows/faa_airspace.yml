name: Update FAA Airspace

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gdal-bin python3-pip
          pip install geopandas shapely fiona pyproj

      - name: Download FAA NASR
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/zip" \
            -o NASR.zip \
            https://aeronav.faa.gov/aero_data/NASR_Subscription/NASR.zip

      - name: Unzip
        run: unzip -o NASR.zip -d nasr

      - name: Convert shapefile
        run: |
          shp=$(find nasr -iname "*Class_Airspace.shp" | head -n 1)
          echo "Using: $shp"
          ogr2ogr -f GeoJSON usa_airspace.geojson "$shp"

      - name: Filter B/C/D
        run: |
          python3 <<EOF
import json
with open("usa_airspace.geojson") as f:
    data = json.load(f)

data["features"] = [
    f for f in data["features"]
    if (f["properties"].get("CLASS") or "").upper() in ["B","C","D"]
]

with open("usa_airspace.geojson","w") as f:
    json.dump(data,f)
EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add usa_airspace.geojson
          git commit -m "Update FAA airspace" || echo "No changes"
          git push
