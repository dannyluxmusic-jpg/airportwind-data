name: Update Airspace (Stable Source)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download airspace data (Open Source)
        run: |
          curl -L -o airspace.geojson \
          https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson

      - name: Rename for app
        run: |
          mv airspace.geojson usa_airspace.geojson

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add usa_airspace.geojson
          git commit -m "Update airspace data" || echo "No changes"
          git push
