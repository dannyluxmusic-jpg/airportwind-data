name: Update Airspace

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gdal-bin curl

      # ✅ FIXED FAA DOWNLOAD (handles blocking)
      - name: Download NASR
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/zip" \
            -H "Referer: https://www.faa.gov/" \
            -o NASR.zip \
            https://aeronav.faa.gov/aero_data/NASR_Subscription/NASR.zip

          echo "Checking file type..."
          file NASR.zip

          # FAIL if FAA blocks (HTML instead of ZIP)
          if file NASR.zip | grep -q "HTML"; then
            echo "❌ FAA BLOCKED DOWNLOAD"
            exit 1
          fi

      - name: Unzip
        run: unzip -o NASR.zip -d nasr

      # DEBUG so we can see actual files
      - name: List files
        run: |
          echo "FILES:"
          find nasr | head -100

      - name: Find airspace shapefile
        run: |
          shp=$(find nasr -iname "*.shp" | grep -i airspace | head -n 1)

          if [ -z "$shp" ]; then
            echo "❌ No airspace shapefile found"
            exit 1
          fi

          echo "Using: $shp"
          ogr2ogr -f GeoJSON usa_airspace.geojson "$shp"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add usa_airspace.geojson
          git commit -m "Update FAA airspace" || echo "No changes"
          git push
