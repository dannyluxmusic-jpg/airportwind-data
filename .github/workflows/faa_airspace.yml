name: Update Airspace

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download Airspace (FORCED ZIP)
        run: |
          curl -L \
            -H "Accept: application/vnd.github+json" \
            -o main.zip \
            https://api.github.com/repos/openaip/openaip-data/zipball

      - name: Verify download
        run: |
          file main.zip
          ls -lh

      - name: Unzip
        run: unzip main.zip

      - name: Extract GeoJSON
        run: |
          mkdir -p airspace
          find . -name "*.geojson" -exec cp {} airspace/ \;

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace
          git commit -m "Update airspace data" || echo "No changes"
          git push
