name: Update FAA Airspace

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gdal-bin

      - name: Download NASR (reuse your working method)
        run: |
          echo "Downloading NASR using Python method..."
          python3 <<EOF
import urllib.request

url = "https://aeronav.faa.gov/aero_data/NASR_Subscription/NASR.zip"
urllib.request.urlretrieve(url, "NASR.zip")
print("Downloaded NASR.zip")
EOF

      - name: Validate ZIP
        run: |
          file NASR.zip
          unzip -l NASR.zip | head

      - name: Unzip
        run: unzip -o NASR.zip -d nasr

      - name: Find shapefile
        run: |
          shp=$(find nasr -iname "*Class_Airspace.shp" | head -n 1)
          echo "Found: $shp"

          if [ -z "$shp" ]; then
            echo "❌ Shapefile not found"
            exit 1
          fi

          echo "SHP_PATH=$shp" >> $GITHUB_ENV

      - name: Convert to GeoJSON
        run: |
          ogr2ogr -f GeoJSON raw_airspace.geojson "$SHP_PATH"

      - name: Filter B/C/D
        run: |
          python3 <<EOF
import json

with open("raw_airspace.geojson") as f:
    data = json.load(f)

filtered = []
for ftr in data["features"]:
    cls = (ftr["properties"].get("CLASS") or "").upper()
    if cls in ["B","C","D"]:
        filtered.append(ftr)

data["features"] = filtered

with open("usa_airspace.geojson", "w") as f:
    json.dump(data, f)

print("Saved", len(filtered), "features")
EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add usa_airspace.geojson
          git commit -m "Update airspace" || echo "No changes"
          git push
