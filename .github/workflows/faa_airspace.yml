name: Update Airspace

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure airspace folder
        run: |
          mkdir -p airspace

      - name: Copy existing airspace file
        run: |
          cp usa_airspace.geojson airspace/ || echo "No file found"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace
          git commit -m "Refresh airspace data" || echo "No changes"
          git push
