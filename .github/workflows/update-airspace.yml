name: Update Airspace

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gdal-bin curl

      # ✅ FIXED DOWNLOAD (no python, no blocking)
      - name: Download NASR
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0" \
            -o NASR.zip \
            https://aeronav.faa.gov/aero_data/NASR_Subscription/NASR.zip

          echo "Checking file..."
          file NASR.zip

      - name: Unzip
        run: unzip -o NASR.zip -d nasr

      # ✅ DEBUG so we SEE what's happening
      - name: List files
        run: |
          echo "FILES:"
          find nasr | head -100

      - name: Find shapefile
        run: |
          shp=$(find nasr -iname "*.shp" | grep -i airspace | head -n 1)

          if [ -z "$shp" ]; then
            echo "❌ No airspace file found"
            exit 1
          fi

          echo "Using: $shp"
          ogr2ogr -f GeoJSON usa_airspace.geojson "$shp"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add usa_airspace.geojson
          git commit -m "Update FAA airspace" || echo "No changes"
          git push
