name: Update FAA Airspace

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gdal-bin jq unzip

      - name: Download FAA NASR
        run: |
          curl -L -o nasr.zip https://www.faa.gov/air_traffic/flight_info/aeronav/aero_data/NASR_Subscription/NASR.zip
          unzip nasr.zip -d nasr

      - name: Find and convert shapefile
        run: |
          FILE=$(find nasr -name "Class_Airspace.shp" | head -n 1)
          echo "Found shapefile at $FILE"

          if [ -z "$FILE" ]; then
            echo "ERROR: Shapefile not found"
            exit 1
          fi

          ogr2ogr -f GeoJSON raw_airspace.json "$FILE"

      - name: Filter Class B C D
        run: |
          jq '.features |= map(select(.properties.CLASS == "B" or .properties.CLASS == "C" or .properties.CLASS == "D"))' raw_airspace.json > airspace.json

      - name: Commit updated file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace.json
          git commit -m "Update airspace data" || echo "No changes"
          git push
