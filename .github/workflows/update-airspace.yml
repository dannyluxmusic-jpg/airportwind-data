name: Update FAA Airspace

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get install -y gdal-bin jq unzip

      - name: Download FAA data
        run: |
          curl -L -o nasr.zip https://www.faa.gov/air_traffic/flight_info/aeronav/aero_data/NASR_Subscription/NASR.zip
          unzip nasr.zip -d nasr

      - name: Convert shapefile
        run: |
          ogr2ogr -f GeoJSON raw_airspace.json nasr/Shapes/Class_Airspace.shp

      - name: Filter B C D
        run: |
          jq '.features |= map(select(.properties.CLASS == "B" or .properties.CLASS == "C" or .properties.CLASS == "D"))' raw_airspace.json > airspace.json

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace.json
          git commit -m "Update airspace" || echo "No changes"
          git push
