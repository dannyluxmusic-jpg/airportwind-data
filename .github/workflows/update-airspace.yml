name: Update FAA Airspace

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gdal-bin jq unzip

      - name: Download FAA NASR
        run: |
          curl -L \
            -A "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" \
            -o nasr.zip \
            https://aeronav.faa.gov/aero_data/NASR_Subscription/NASR.zip

          echo "Checking file..."
          file nasr.zip

          if file nasr.zip | grep -q "HTML"; then
            echo "ERROR: FAA blocked download (got HTML instead of ZIP)"
            exit 1
          fi

          echo "Unzipping..."
          unzip -q nasr.zip -d nasr

      - name: Find and convert shapefile
        run: |
          FILE=$(find nasr -name "Class_Airspace.shp" | head -n 1)

          echo "Found shapefile: $FILE"

          if [ -z "$FILE" ]; then
            echo "ERROR: Shapefile not found"
            exit 1
          fi

          ogr2ogr -f GeoJSON raw_airspace.json "$FILE"

      - name: Filter Class B C D
        run: |
          jq '.features |= map(select(.properties.CLASS == "B" or .properties.CLASS == "C" or .properties.CLASS == "D"))' raw_airspace.json > airspace.json

      - name: Commit updated file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airspace.json
          git commit -m "Update airspace data" || echo "No changes"
          git push
