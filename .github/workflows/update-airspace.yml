name: Update Airspace

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip gdal-bin python3-pip

      - name: Download NASR
        run: |
          python3 <<EOF
import urllib.request
url = "https://aeronav.faa.gov/aero_data/NASR_Subscription/NASR.zip"
urllib.request.urlretrieve(url, "NASR.zip")
print("Downloaded NASR.zip")
EOF

      - name: Unzip
        run: unzip -o NASR.zip -d nasr

      - name: Find airspace shapefile
        run: |
          shp=$(find nasr -iname "*.shp" | grep -i airspace | head -n 1)

          if [ -z "$shp" ]; then
            echo "❌ No airspace shapefile found"
            find nasr | head -200
            exit 1
          fi

          echo "Using: $shp"
          ogr2ogr -f GeoJSON usa_airspace.geojson "$shp"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add usa_airspace.geojson
          git commit -m "Update FAA airspace" || echo "No changes"
          git push
