name: Update Airport Locations

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install requests

      - name: Run Builder
        run: python build_airport_locations.py

      - name: Commit airport locations
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add airport_locations.csv
          git commit -m "Update airport locations" || echo "No changes to commit"
          git push
