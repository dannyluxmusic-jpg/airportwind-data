name: Update Airport Frequencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Download current NASR zip
        shell: bash
        run: |
          set -euo pipefail

          NASR_URL=$(curl -fsSL "https://www.faa.gov/air_traffic/flight_info/aeronav/aero_data/NASR_Subscription" \
            | grep -Eo 'https://nfdc\.faa\.gov/webContent/28DaySub/28DaySubscription_Effective_[0-9]{4}-[0-9]{2}-[0-9]{2}\.zip' \
            | head -n 1)

          echo "Resolved NASR URL:"
          echo "$NASR_URL"

          curl -L --fail --retry 20 --retry-all-errors --retry-delay 5 \
            -o NASR.zip "$NASR_URL"

          ls -lh NASR.zip

      # 🔧 BUILD NEW DATA (TEMP ONLY)
      - name: Build new frequencies (temp file)
        run: |
          python build_frequencies.py
          mv airport_frequencies.csv new_freqs.csv

      # 🔧 MERGE WITH EXISTING (PRESERVE PHONES)
      - name: Merge with existing CSV (preserve phones)
        run: |
          python3 <<EOF
import csv

old = {}
try:
    with open("airport_frequencies.csv", newline="") as f:
        reader = csv.reader(f)
        next(reader, None)
        for r in reader:
            old.setdefault(r[0], []).append(r)
except:
    pass

new = {}
with open("new_freqs.csv", newline="") as f:
    reader = csv.reader(f)
    next(reader, None)
    for r in reader:
        new.setdefault(r[0], []).append(r)

merged = []

for icao in set(old) | set(new):
    # keep ALL existing data (phones, etc)
    for r in old.get(icao, []):
        merged.append(r)

    # add new frequencies only if missing
    existing = set((r[1], r[2]) for r in old.get(icao, []))
    for r in new.get(icao, []):
        if (r[1], r[2]) not in existing:
            merged.append(r)

with open("airport_frequencies.csv", "w", newline="") as f:
    writer = csv.writer(f)
    writer.writerow(["icao","type","value"])
    writer.writerows(merged)
EOF

      - name: Commit changes (only if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airport_frequencies.csv
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto update airport frequencies"
          git push
