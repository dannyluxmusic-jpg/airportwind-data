name: Update Airport Frequencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip
        run: python -m pip install --upgrade pip

      - name: Download NASR
        run: |
          URL=$(curl -fsSL "https://www.faa.gov/air_traffic/flight_info/aeronav/aero_data/NASR_Subscription" \
            | grep -Eo 'https://nfdc\.faa\.gov/webContent/28DaySub/28DaySubscription_Effective_[0-9\-]+\.zip' \
            | head -n 1)

          echo "Downloading:"
          echo "$URL"

          curl -L -o NASR.zip "$URL"

      - name: Debug (verify correct file)
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "SCRIPT HEAD:"
          head -5 build_frequencies.py

      - name: Run builder
        run: python ./build_frequencies.py

      - name: Commit + push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase

          git add airport_frequencies.csv
          git commit -m "Auto update airport frequencies" || echo "No changes"

          git push
