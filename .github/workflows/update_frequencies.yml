name: Update Airport Frequencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 */28 * *"   # every 28 days

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip

      # -------------------------
      # DOWNLOAD NASR (AUTO)
      # -------------------------
      - name: Download NASR
        run: |
          URL=$(curl -fsSL "https://www.faa.gov/air_traffic/flight_info/aeronav/aero_data/NASR_Subscription/" \
            | grep -Eo 'https://nfdc\.faa\.gov/webContent/28DaySub/28DaySubscription_Effective_[0-9\-]+\.zip' \
            | head -n 1)

          echo "Downloading: $URL"
          curl -L -o NASR.zip "$URL"

      # -------------------------
      # UNZIP NASR
      # -------------------------
      - name: Unzip NASR
        run: unzip -o NASR.zip

      # -------------------------
      # BUILD CSV (THIS IS YOUR SCRIPT)
      # -------------------------
      - name: Build frequencies
        run: python build_frequencies.py

      # -------------------------
      # COMMIT RESULT
      # -------------------------
      - name: Commit + push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add airport_frequencies.csv
          git commit -m "Auto update airport frequencies" || exit 0
          git push
