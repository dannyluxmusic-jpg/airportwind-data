on:
  schedule:
    - cron: '0 6 */28 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Download FAA NASR Data
        run: |
          curl -L -o NASR.zip https://nfdc.faa.gov/webContent/28DaySub/28DaySubscription_Effective.zip
          unzip -q NASR.zip

      - name: Build Frequency CSV
        run: |
          python build_frequencies.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airport_frequencies.csv
          git commit -m "Auto update airport frequencies" || echo "No changes"
          git push

