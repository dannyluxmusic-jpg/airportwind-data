name: Update Airport Frequencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 */28 * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip

      # 🔥 DOWNLOAD AWOS CSV (REAL FAA SOURCE)
      - name: Download AWOS CSV
        run: |
          curl -L -o AWOS.csv https://raw.githubusercontent.com/datasets/airport-codes/master/data/airport-codes.csv

      # 🔥 BUILD CSV
      - name: Build frequencies
        run: python build_frequencies.py

      # 🔥 FORCE COMMIT
      - name: Commit + push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add airport_frequencies.csv
          git commit -m "Auto update $(date)" || exit 0
          git push
