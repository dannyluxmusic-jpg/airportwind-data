name: Update Airport Frequencies

on:
  workflow_dispatch:
  schedule:
    - cron: "12 6 * * 1"   # Runs weekly (Monday 06:12 UTC)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Download FAA Frequency Data (ArcGIS CSV)
        run: |
          curl -L --fail --retry 5 -o faa_frequency_raw.csv \
          "https://adds-faa.opendata.arcgis.com/api/v3/datasets/16966d553d454cca9706d2ce32b14d31_0/downloads/data?format=csv&where=1%3D1&spatialRefId=4326"

          curl -L --fail --retry 5 -o faa_services_raw.csv \
          "https://adds-faa.opendata.arcgis.com/api/v3/datasets/6e89f7409c2f486894f5393859232cc9_0/downloads/data?format=csv&where=1%3D1&spatialRefId=4326"

          curl -L --fail --retry 5 -o faa_airports_raw.csv \
          "https://adds-faa.opendata.arcgis.com/api/v3/datasets/e747ab91a11045e8b3f8a3efd093d3b5_0/downloads/data?format=csv&where=1%3D1&spatialRefId=4326"

      - name: Build airport_frequencies.csv
        run: python build_frequencies.py

      - name: Commit changes (only if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add airport_frequencies.csv
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto update airport frequencies"
          git push
